<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 创业情报决策仪表盘</title>
    <style>
      :root {
        --bg: #060a14;
        --panel: rgba(16, 24, 40, 0.68);
        --panel-strong: rgba(14, 21, 36, 0.88);
        --line: rgba(133, 170, 255, 0.25);
        --text: #eef3ff;
        --muted: #9cafce;
        --accent: #73b8ff;
        --ok: #69efcc;
        --warn: #ffb869;
        --hot: #ff8d7f;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; }
      body {
        font-family: Inter, "Segoe UI", "PingFang SC", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 15% -5%, #1d3159 0%, transparent 40%), radial-gradient(circle at 90% 5%, #17344c 0%, transparent 35%), var(--bg);
      }
      .container { width: min(1240px, 92vw); margin: 0 auto; }
      .top-nav {
        position: sticky; top: 0; z-index: 30;
        border-bottom: 1px solid var(--line);
        backdrop-filter: blur(15px);
        background: rgba(5, 10, 20, 0.8);
      }
      .nav-inner { min-height: 70px; display: grid; grid-template-columns: auto 1fr; gap: 1rem; align-items: center; }
      .brand h1 { margin: 0; font-size: 1.05rem; }
      .brand p { margin: .2rem 0 0; color: var(--muted); font-size: .82rem; }
      .controls { display: grid; gap: .6rem; }
      .filters { display: flex; flex-wrap: wrap; gap: .45rem; }
      .quick-nav { display: flex; flex-wrap: wrap; gap: .45rem; }
      .quick-link {
        border: 1px solid var(--line);
        background: rgba(36, 49, 75, 0.4);
        color: var(--text);
        border-radius: 10px;
        padding: .42rem .65rem;
        text-decoration: none;
        font-size: .84rem;
        transition: transform .2s ease, border-color .2s ease, background .2s ease;
      }
      .quick-link:hover { border-color: var(--accent); background: rgba(56, 98, 172, 0.32); transform: translateY(-1px); }
      .quick-link:active { transform: scale(.98); }
      select, input {
        border: 1px solid var(--line);
        background: rgba(36, 49, 75, 0.55);
        color: var(--text);
        border-radius: 10px;
        padding: .45rem .6rem;
      }
      main { padding: 1rem 0 2rem; }
      .panel {
        border: 1px solid var(--line);
        border-radius: 18px;
        background: var(--panel);
        backdrop-filter: blur(14px);
        box-shadow: 0 20px 42px rgba(2, 8, 20, 0.5);
      }
      .section { margin-top: 1rem; padding: 1rem; }
      .section h2 { margin: 0; font-size: 1.2rem; }
      .sub { color: var(--muted); font-size: .84rem; margin-top: .2rem; }
      .grid { display: grid; gap: .75rem; margin-top: .75rem; }
      .brief-grid { grid-template-columns: repeat(3, minmax(0,1fr)); }
      .radar-grid { grid-template-columns: repeat(3, minmax(0,1fr)); }
      .tools-grid { grid-template-columns: repeat(4, minmax(0,1fr)); }
      .card { border: 1px solid var(--line); border-radius: 14px; background: var(--panel-strong); padding: .85rem; }
      .interactive {
        cursor: pointer;
        transition: transform .22s ease, border-color .22s ease, box-shadow .22s ease;
      }
      .interactive:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(12, 38, 72, .45); }
      .interactive:active { transform: scale(.99); }
      .title { margin: .2rem 0; font-size: 1rem; }
      .meta { font-size: .78rem; color: var(--muted); }
      .impact { margin: .4rem 0 0; line-height: 1.45; font-size: .88rem; }
      .tag { border: 1px solid var(--line); border-radius: 999px; padding: .1rem .5rem; font-size: .7rem; margin-right: .35rem; }
      .empty { color: var(--muted); border: 1px dashed var(--line); border-radius: 12px; padding: .8rem; }
      .kpi { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: .4rem; margin-top: .5rem; }
      .kpi div { background: rgba(98,132,194,.15); border: 1px solid var(--line); border-radius: 10px; padding: .35rem .45rem; font-size: .76rem; }
      .bar { height: 6px; border-radius: 99px; background: rgba(255,255,255,.08); margin-top: .5rem; overflow: hidden; }
      .bar span { height: 100%; display: block; background: linear-gradient(90deg,var(--accent),var(--ok)); }
      .funding-layout { display: grid; grid-template-columns: 1.1fr .9fr; gap: .75rem; }
      .details {
        display: grid;
        grid-template-rows: 0fr;
        opacity: 0;
        transition: grid-template-rows .28s ease, opacity .26s ease;
      }
      .details > div { overflow: hidden; }
      .card.expanded .details { grid-template-rows: 1fr; opacity: 1; margin-top: .45rem; }
      .modal {
        position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
        background: rgba(3, 8, 17, 0.72); z-index: 80; padding: 1rem;
      }
      .modal.open { display: flex; }
      .modal-panel { width: min(720px, 100%); max-height: 90vh; overflow: auto; padding: 1rem; }
      .modal-close { float: right; }
      @media (max-width: 980px) {
        .nav-inner { grid-template-columns: 1fr; padding: .7rem 0; }
        .brief-grid,.radar-grid,.tools-grid,.funding-layout,.kpi { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <header class="top-nav">
      <div class="container nav-inner">
        <div class="brand"><h1>AI 创业情报决策仪表盘</h1><p>5 秒看懂今日 AI 关键变化、机会与风险</p></div>
        <div class="controls">
          <div class="filters">
            <input id="searchInput" placeholder="搜索事件 / 工具 / 融资" />
            <select id="typeFilter"><option value="全部">全部赛道</option><option value="AI Agent">AI Agent</option><option value="AI Coding">AI Coding</option><option value="AI 视频">AI 视频</option><option value="AI 医疗">AI 医疗</option><option value="AI 企业服务">AI 企业服务</option></select>
            <select id="timeFilter"><option value="全部">全部时间</option><option value="24h">24h</option><option value="7d">7d</option><option value="30d">30d</option></select>
            <select id="heatFilter"><option value="全部">全部热度</option><option value="90">90+</option><option value="80">80+</option></select>
          </div>
          <nav class="quick-nav">
            <a href="#brief" class="quick-link">今日 Brief</a>
            <a href="#trends" class="quick-link">AI 趋势雷达</a>
            <a href="#tools" class="quick-link">热门工具</a>
            <a href="#funding" class="quick-link">融资资讯</a>
          </nav>
          <div class="sub" id="refreshInfo"></div>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="panel section" id="brief"><h2>今日 AI Brief（最重要 3 条）</h2><div class="sub">点击卡片查看详情：发生了什么、为什么重要、商业影响、创业机会、风险提示、来源链接</div><div class="grid brief-grid" id="briefGrid"></div></section>
      <section class="panel section" id="trends"><h2>AI 趋势雷达</h2><div class="grid radar-grid" id="radarGrid"></div></section>
      <section class="panel section" id="tools"><h2>热门 AI 工具榜</h2><div class="grid tools-grid" id="toolGrid"></div></section>
      <section class="panel section" id="funding"><h2>AI 创业与融资情报</h2><div class="funding-layout"><div id="fundingTop"></div><div id="fundingInsights"></div></div></section>
    </main>
    <div id="detailModal" class="modal" role="dialog" aria-modal="true" aria-label="详情弹窗"></div>

    <script>
      const mockData = {
        brief: [
          {title:"OpenAI 推出企业级 Agent 执行框架", happened:"发布可审计多 Agent 流程模板，支持审批与责任追踪。", important:"降低企业部署复杂度，推动 Agent 从 Demo 走向生产。", biz:"咨询、交付、流程自动化市场加速。", opp:"可做行业 Agent OS、评估与治理工具。", risk:"合规与错误执行风险仍需人工兜底。", source:"OpenAI", time:"2026-05-08 08:30", type:"赛道", heat:95, track:"AI Agent", age:"24h"},
          {title:"AI Coding 工具席位战升温", happened:"多家编程助手发布团队版并强化代码库检索。", important:"研发效率成为中型企业降本核心抓手。", biz:"团队订阅 ARPU 提升，进入企业软件采购池。", opp:"围绕安全、审计、迁移的插件机会明确。", risk:"同质化严重，获客成本上升。", source:"GitHub + 产品公告", time:"2026-05-08 09:15", type:"工具", heat:91, track:"AI Coding", age:"24h"},
          {title:"AI 视频赛道连续出现高额融资", happened:"两家生成式视频公司披露新一轮融资。", important:"资本继续押注内容生产基础设施。", biz:"广告、电商素材、教育视频自动化需求释放。", opp:"可切入垂类模板与后期工作流 SaaS。", risk:"算力成本与版权合规压力高。", source:"TechCrunch / 公司公告", time:"2026-05-08 10:05", type:"融资", heat:89, track:"AI 视频", age:"24h"}
        ],
        radar: [
          {track:"AI Agent", heat:95, trend:"↑ 强增长", opportunity:"企业流程自动化与垂直执行体", level:"S"},
          {track:"AI Coding", heat:92, trend:"↑ 稳定增长", opportunity:"团队协作、代码治理、合规审计", level:"S"},
          {track:"AI 视频", heat:88, trend:"↑ 快速增长", opportunity:"营销素材自动化、短视频工厂", level:"A"},
          {track:"AI 搜索", heat:84, trend:"→ 高位震荡", opportunity:"垂类检索、企业知识问答", level:"A"},
          {track:"AI 医疗", heat:81, trend:"↑ 缓慢增长", opportunity:"病历结构化、辅助决策", level:"A"},
          {track:"AI 企业服务", heat:86, trend:"↑ 稳健增长", opportunity:"Agent 运维平台、质量监控", level:"A"}
        ],
        tools: [
          {name:"Cursor", track:"AI Coding", heat:94, growth:"+23%", use:"工程团队", signal:"团队版扩张"},
          {name:"Perplexity", track:"AI 搜索", heat:88, growth:"+16%", use:"研究/投研", signal:"信息效率提升"},
          {name:"Runway", track:"AI 视频", heat:86, growth:"+20%", use:"内容团队", signal:"视频生产链完善"},
          {name:"Harvey", track:"AI 企业服务", heat:82, growth:"+12%", use:"法律/专业服务", signal:"垂直化深化"}
        ],
        funding: {
          top3:[
            "视频生成基础模型公司 A 完成 B 轮融资，估值提升。",
            "医疗 AI 平台公司 B 获战略投资，重点布局临床场景。",
            "企业 Agent 安全公司 C 完成种子扩展轮。"
          ],
          weekly:"本周融资集中在 AI 视频、企业 Agent 安全与医疗合规三条线，早中期轮次占比上升。",
          lanes:"高潜赛道：Agent 质量评估、行业知识引擎、AI 工作流编排。",
          investor:"投资人关注信号：可复制销售路径、合规闭环、真实付费客户增长。",
          founder:"创业者机会：做“模型能力 + 行业工作流 + 可量化 ROI”的窄切产品。"
        }
      };

      const byId = (id) => document.getElementById(id);
      const state = { q:"", type:"全部", time:"全部", heat:"全部", expandedBrief:null };

      function applyFilters(items) {
        return items.filter(i => {
          const hitQ = `${i.title}${i.happened}${i.track}${i.type}${i.source}`.toLowerCase().includes(state.q.toLowerCase());
          const hitType = state.type === "全部" || i.track === state.type;
          const hitTime = state.time === "全部" || i.age === state.time;
          const hitHeat = state.heat === "全部" || i.heat >= Number(state.heat);
          return hitQ && hitType && hitTime && hitHeat;
        });
      }

      function renderBrief() {
        const list = applyFilters(mockData.brief).slice(0,3);
        byId("briefGrid").innerHTML = list.length ? list.map((i, idx) => `<article class="card interactive ${state.expandedBrief === idx ? "expanded" : ""}" data-brief-index="${idx}" role="button" tabindex="0" aria-expanded="${state.expandedBrief === idx}"><span class="tag">${i.track}</span><span class="tag">热度 ${i.heat}</span><h3 class="title">${i.title}</h3><div class="meta">${i.source} · ${i.time}</div><div class="details"><div><p class="impact"><b>发生了什么：</b>${i.happened}</p><p class="impact"><b>为什么重要：</b>${i.important}</p><p class="impact"><b>商业影响：</b>${i.biz}</p><p class="impact"><b>创业机会：</b>${i.opp}</p><p class="impact"><b>风险提示：</b>${i.risk}</p><p class="impact"><b>来源链接：</b><a class="quick-link" href="#" onclick="event.preventDefault()">查看来源（${i.source}）</a></p></div></div></article>`).join("") : '<div class="empty">暂无匹配情报</div>';
      }

      function renderRadar() {
        byId("radarGrid").innerHTML = mockData.radar.map(r => `<article class="card"><h3 class="title">${r.track}</h3><div class="meta">关注等级：${r.level}</div><div class="kpi"><div>热度 ${r.heat}</div><div>趋势 ${r.trend}</div><div style="grid-column:span 2;">商业机会：${r.opportunity}</div></div><div class="bar"><span style="width:${r.heat}%"></span></div></article>`).join("");
      }

      function renderTools() {
        const items = mockData.tools.filter(t => (state.type === "全部" || t.track === state.type) && (state.time === "全部" || t.age === state.time) && (state.heat === "全部" || t.heat >= Number(state.heat)) && (`${t.name}${t.track}${t.use}${t.signal}`.toLowerCase().includes(state.q.toLowerCase())));
        byId("toolGrid").innerHTML = items.length ? items.map((t, idx) => `<article class="card interactive" data-tool-index="${idx}" role="button" tabindex="0"><h3 class="title">${t.name}</h3><div class="meta">赛道：${t.track} ｜ 热度：${t.heat}</div><p class="impact">增长：${t.growth} ｜ 适用人群：${t.use}</p><p class="impact">信号：${t.signal}</p></article>`).join("") : '<div class="empty">暂无匹配情报</div>';
        return items;
      }

      function renderFunding() {
        const f = mockData.funding; const events = f.events.filter(e => (state.type === "全部" || e.track === state.type) && (state.time === "全部" || e.age === state.time) && (state.heat === "全部" || e.heat >= Number(state.heat)) && (`${e.company}${e.track}${e.round}${e.investors}`.toLowerCase().includes(state.q.toLowerCase())));
        byId("fundingTop").innerHTML = events.length ? `<div class="card"><h3 class="title">今日融资事件</h3><ol>${events.map((e, idx) => `<li class="impact"><button class="quick-link funding-link" data-funding-index="${idx}">${e.company}｜${e.round}｜${e.amount}</button></li>`).join("")}</ol></div><div class="card" style="margin-top:.7rem;"><h3 class="title">本周融资趋势</h3><p class="impact">${f.weekly}</p></div>` : '<div class="empty">暂无匹配情报</div>';
        byId("fundingInsights").innerHTML = `<div class="card"><h3 class="title">高潜赛道</h3><p class="impact">${f.lanes}</p><h3 class="title">投资人关注信号</h3><p class="impact">${f.investor}</p><h3 class="title">创业者机会分析</h3><p class="impact">${f.founder}</p></div>`;
        return events;
      }

      function render() {
        renderBrief(); renderRadar(); const toolItems = renderTools(); const fundingItems = renderFunding();
        bindInteractions(toolItems, fundingItems);
        byId("refreshInfo").textContent = `最近更新：${new Date().toLocaleString("zh-CN", {hour12:false})}`;
      }
      function openModal(title, lines) {
        byId("detailModal").innerHTML = `<div class="modal-panel panel"><button class="quick-link modal-close" id="closeModal">关闭</button><h3 class="title">${title}</h3>${lines.map(l => `<p class="impact">${l}</p>`).join("")}</div>`;
        byId("detailModal").classList.add("open");
        byId("closeModal").onclick = closeModal;
      }
      function closeModal() { byId("detailModal").classList.remove("open"); }
      function bindInteractions(toolItems, fundingItems) {
        document.querySelectorAll("[data-brief-index]").forEach(el => {
          const toggle = () => { const idx = Number(el.dataset.briefIndex); state.expandedBrief = state.expandedBrief === idx ? null : idx; render(); };
          el.onclick = toggle; el.onkeydown = (e) => (e.key === "Enter" || e.key === " ") && toggle();
        });
        document.querySelectorAll("[data-tool-index]").forEach(el => {
          const t = toolItems[Number(el.dataset.toolIndex)];
          const open = () => openModal(`${t.name} 工具详情`, [`工具简介：${t.signal}`, `适合人群：${t.use}`, `核心功能：AI 辅助能力 + 工作流提效`, `替代品：同赛道其他 ${t.track} 工具`, `官网链接：${t.site}`]);
          el.onclick = open; el.onkeydown = (e) => (e.key === "Enter" || e.key === " ") && open();
        });
        document.querySelectorAll(".funding-link").forEach(el => {
          const f = fundingItems[Number(el.dataset.fundingIndex)];
          el.onclick = () => openModal(`${f.company} 融资详情`, [`公司简介：${f.profile}`, `融资金额：${f.amount}`, `轮次：${f.round}`, `投资方：${f.investors}`, `赛道：${f.track}`, `商业意义：${f.business}`, `风险判断：${f.risk}`]);
        });
      }
      document.querySelectorAll(".quick-link[href^='#']").forEach(a => a.addEventListener("click", (e) => { e.preventDefault(); document.querySelector(a.getAttribute("href"))?.scrollIntoView({behavior:"smooth", block:"start"}); }));
      byId("detailModal").addEventListener("click", e => { if (e.target.id === "detailModal") closeModal(); });

      byId("searchInput").addEventListener("input", e => { state.q = e.target.value; render(); });
      byId("typeFilter").addEventListener("change", e => { state.type = e.target.value; render(); });
      byId("timeFilter").addEventListener("change", e => { state.time = e.target.value; render(); });
      byId("heatFilter").addEventListener("change", e => { state.heat = e.target.value; render(); });

      mockData.tools = mockData.tools.map(t => ({...t, site:`https://example.com/${t.name.toLowerCase()}`, age:"7d"}));
      mockData.funding.events = [
        {company:"视频生成基础模型公司 A", profile:"聚焦营销与内容生产的生成式视频基础设施。", amount:"$85M", round:"B 轮", investors:"North Star / Vision Capital", track:"AI 视频", business:"推动广告与电商素材工业化交付。", risk:"高算力成本与内容版权风险。", heat:89, age:"24h"},
        {company:"医疗 AI 平台公司 B", profile:"提供临床决策支持与病历结构化产品。", amount:"$42M", round:"战略轮", investors:"MediGrowth / Hospital Ventures", track:"AI 医疗", business:"加速医院场景落地和医疗合规能力建设。", risk:"监管周期长、销售周期重。", heat:84, age:"7d"},
        {company:"企业 Agent 安全公司 C", profile:"专注 Agent 审计、权限控制与风险拦截。", amount:"$18M", round:"种子扩展轮", investors:"Secure AI Fund", track:"AI 企业服务", business:"补齐企业 Agent 生产环境必需安全层。", risk:"客户教育成本较高。", heat:82, age:"30d"}
      ];
      render();
    </script>
  </body>
</html>
