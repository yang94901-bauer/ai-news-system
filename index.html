<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI News System</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #1e293b, #020617);
        color: #e2e8f0;
      }
      main {
        width: min(720px, 92vw);
        padding: 2.5rem;
        border-radius: 16px;
        background: rgba(15, 23, 42, 0.82);
        border: 1px solid rgba(148, 163, 184, 0.3);
        box-shadow: 0 20px 45px rgba(2, 6, 23, 0.45);
      }
      h1 {
        margin-top: 0;
        font-size: clamp(1.8rem, 3.6vw, 2.6rem);
      }
      p {
        line-height: 1.7;
        margin: 0.75rem 0;
      }
      .status {
        display: inline-block;
        margin-top: 1rem;
        padding: 0.4rem 0.7rem;
        border-radius: 999px;
        background: rgba(34, 197, 94, 0.18);
        color: #86efac;
        font-weight: 700;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>AI News System 已成功部署</h1>
      <p>如果你看到此页面，说明 Vercel 已正确识别并发布了项目首页入口。</p>
      <p>后续你可以在此基础上接入前端框架或 API 内容。</p>
      <span class="status">✅ Home Page Online</span>
    </main>
  </body>
</html>
